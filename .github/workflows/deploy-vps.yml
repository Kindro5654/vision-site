name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (root path — no basePath)
        env:
          NEXT_PUBLIC_LEAD_ENDPOINT: https://crm.vision-club.ae/api/webhooks/website-lead
          NEXT_PUBLIC_LEAD_API_KEY: ${{ secrets.LEAD_API_KEY }}
        run: npm run build
        # NEXT_PUBLIC_BASE_PATH intentionally unset so paths point at the domain root

      - name: Install SSH deploy key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Rsync out/ to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            out/ \
            "$VPS_USER@$VPS_HOST:/var/www/vision-site/"

      - name: Smoke test
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          sleep 2
          curl -fsSL "http://$VPS_HOST/" | head -c 200
          echo ""
